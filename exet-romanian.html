<script>

/**
 * Language-specific parameters for Romanian.
 *
 * The 31-letter Romanian alphabet (A Ă Â B C D E F G H I Î J K L M N O P Q R
 * S Ș T Ț U V W X Y Z) is NOT specified here -- Exet derives the working
 * alphabet from the loaded lexicon (lufz-ro-lexicon.js), which was built with
 * the "Romanian" Lufz config that treats ă â î ș ț as distinct grid letters.
 */
exetConfig = {
  defaultDimension: 15,
  // Provisional 90k lexicon with noisy scores -> do not restrict by
  // popularity, or the autofill can starve. Raise later once the wordlist
  // is finalized.
  defaultPopularity: 0,
  researchTools: [
    /** The first entry should not be name: "separator" */
    {url: "https://dexonline.ro/definitie/", name: "dexonline"},
    {url: "https://ro.wiktionary.org/wiki/", name: "Wiktionary"},
  ],
  extraTabs: [],
  listsLinks: [
    {name: "Wikipedia's list of crossword abbreviations",
     url: "https://en.wikipedia.org/wiki/Crossword_abbreviations"},
  ],
};
</script>

<script src="exolve-m.js?v1.71"></script>
<script src="exolve-from-puz.js?v1.71"></script>
<script src="exolve-from-ipuz.js?v1.71"></script>

<script src="exolve-to-ipuz.js?v1.71"></script>

<script src="exet-analysis.js?v1.05"></script>
<script src="exet-storage.js?v1.05"></script>
<script src="exet.js?v1.05"></script>
<script src="exet-autofill.js?v1.05"></script>
<script src="exet-lexicon.js?v1.05"></script>

<title>Exet Romanian: Create a crossword in Romanian</title>

</head>
<body>

<div id="xet-loading"
    style="text-align:center;font-family:monospace;padding-top:100px">
  <h3><span class="xet-blue">Exet: A web app for crossword construction</span></h3>
  <h4>Loading the lexicon. This may take a few seconds, please wait...</h4>
</div>

<div id="xet-xlv-frame">
</div>

</body>
